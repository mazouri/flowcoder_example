<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI/UX 原型 - 详情页</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="header__logo">FlowCoder</div>
    <nav class="header__nav">
      <a href="../index.html">仪表盘</a>
      <a href="list.html">列表</a>
      <a href="detail.html" class="active">详情</a>
    </nav>
    <div>
      <button class="btn btn-secondary">编辑</button>
      <button class="btn btn-primary">保存</button>
    </div>
  </header>

  <aside class="sidebar">
    <a href="../index.html" class="sidebar__item">
      <span>📊</span>
      <span>仪表盘</span>
    </a>
    <a href="list.html" class="sidebar__item">
      <span>📋</span>
      <span>列表</span>
    </a>
    <a href="detail.html" class="sidebar__item active">
      <span>📄</span>
      <span>详情</span>
    </a>
    <a href="#" class="sidebar__item">
      <span>⚙️</span>
      <span>设置</span>
    </a>
  </aside>

  <main class="main">
    <div class="main__container">
      <div style="margin-bottom: var(--spacing-lg);">
        <a href="list.html" style="color: var(--color-neutral-500); font-size: var(--font-size-sm);">← 返回列表</a>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: var(--spacing-md); margin-bottom: var(--spacing-xl);">
        <div>
          <h1>项目 Beta</h1>
          <span class="badge badge-warning" style="margin-top: var(--spacing-sm);">进行中</span>
        </div>
      </div>

      <div class="detail-layout" style="display: grid; grid-template-columns: 2fr 1fr; gap: var(--spacing-xl);">
        <!-- 主内容 -->
        <div>
          <div class="card" style="margin-bottom: var(--spacing-lg);">
            <h3>基本信息</h3>
            <p>项目 Beta 是一个示例项目，用于展示 UI/UX 原型的详情页布局。包含基本信息、时间线等模块。</p>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--spacing-md); margin-top: var(--spacing-lg);">
              <div>
                <div style="font-size: var(--font-size-sm); color: var(--color-neutral-500);">创建时间</div>
                <div>2025-02-22 14:30</div>
              </div>
              <div>
                <div style="font-size: var(--font-size-sm); color: var(--color-neutral-500);">负责人</div>
                <div>李四</div>
              </div>
              <div>
                <div style="font-size: var(--font-size-sm); color: var(--color-neutral-500);">截止日期</div>
                <div>2025-03-15</div>
              </div>
              <div>
                <div style="font-size: var(--font-size-sm); color: var(--color-neutral-500);">优先级</div>
                <div>高</div>
              </div>
            </div>
          </div>

          <div class="card">
            <h3>时间线</h3>
            <div style="border-left: 2px solid var(--color-neutral-200); padding-left: var(--spacing-lg);">
              <div style="margin-bottom: var(--spacing-lg);">
                <div style="font-weight: 600;">项目创建</div>
                <div style="font-size: var(--font-size-sm); color: var(--color-neutral-500);">2025-02-22 14:30</div>
              </div>
              <div style="margin-bottom: var(--spacing-lg);">
                <div style="font-weight: 600;">开始开发</div>
                <div style="font-size: var(--font-size-sm); color: var(--color-neutral-500);">2025-02-23 09:00</div>
              </div>
              <div>
                <div style="font-weight: 600;">进行中</div>
                <div style="font-size: var(--font-size-sm); color: var(--color-neutral-500);">当前状态</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 侧边 -->
        <div>
          <div class="card">
            <h3>操作</h3>
            <div style="display: flex; flex-direction: column; gap: var(--spacing-sm);">
              <button class="btn btn-primary" style="width: 100%;">更新状态</button>
              <button class="btn btn-secondary" style="width: 100%;">分配成员</button>
              <button class="btn btn-ghost" style="width: 100%;">导出</button>
              <button class="btn btn-danger" style="width: 100%;">删除项目</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
